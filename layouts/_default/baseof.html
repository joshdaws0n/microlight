<!DOCTYPE html>
<html lang="en">
{{ partial "head.html" . }}
<body>
  <!-- Top navigation bar -->
  {{ partial "sidebar.html" . }}
  
  <!-- Main content -->
  <div class="container-fluid">
    <div class="row justify-content-center">
      <div class="col-12 pt-3" id="content">
        <!-- Lightbox container -->
        <div id="lightbox">
          <div id="lightbox-container" class="lightbox-container">
            <button id="prev-btn" class="btn btn-primary">
              <i class="fa-solid fa-arrow-left"></i>
            </button>
            <img id="lightbox-image" src="" alt="">
            <button id="next-btn" class="btn btn-primary">
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
        </div>
        {{ block "main" . }}{{ end }}
      </div>
    </div>
  </div>
  {{ range .Site.Params.plugins_js }}
  <script src="{{ . }}"></script>
  {{ end }}
  <script src="https://unpkg.com/imagesloaded@5.0.0/imagesloaded.pkgd.min.js"></script>
  <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
  <script src="https://kit.fontawesome.com/f9bfe062c6.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>
    {{ with .Site.Params.lastfmUsername }}
    {{ if ne . "" }}
      <script>
        const lastfmUsername = "{{ . }}";
      </script>
      {{ with $.Site.Params.apiKey }}
      {{ if ne . "" }}
        <script>
          const lastfmApiKey = "{{ . }}";
        </script>
        <script src="{{ "js/lastfm.js" | relURL }}"></script>
        {{ end }}
        {{ end }}
    {{ end }}
    {{ end }}
  <!-- <script src="{{ "js/search.js" | relURL }}"></script> -->
  <script>
    // Search toggle
    const toggle = document.getElementById('search-toggle');
    const form = document.getElementById('search-form');
    const input = document.getElementById('search-input');
  
    toggle.addEventListener('click', () => {
      form.classList.toggle('expanded');
      if (form.classList.contains('expanded')) {
        input.focus();
      }
    });
  
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const query = encodeURIComponent(input.value.trim());
      if (query) {
        window.location.href = `/search/?q=${query}`;
      }
    });
  
    document.addEventListener('click', (e) => {
      if (!form.contains(e.target) && !toggle.contains(e.target)) {
        form.classList.remove('expanded');
      }
    });

    // RSS copy — handles both the nav button and any data-rss-path buttons
    (function () {
      const toast = document.getElementById('rss-toast');
      if (!toast) return;

      function copyFeed(url) {
        navigator.clipboard.writeText(url).then(function () {
          toast.classList.add('show');
          setTimeout(function () { toast.classList.remove('show'); }, 2000);
        }).catch(function () {
          const ta = document.createElement('textarea');
          ta.value = url;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          toast.classList.add('show');
          setTimeout(function () { toast.classList.remove('show'); }, 2000);
        });
      }

      // Main nav RSS button — always /feed.xml
      const mainBtn = document.getElementById('rss-copy-btn');
      if (mainBtn) {
        mainBtn.addEventListener('click', function () {
          copyFeed(window.location.origin + '/feed.xml');
        });
      }

      // Any other RSS buttons with a data-rss-path attribute
      document.querySelectorAll('[data-rss-path]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          copyFeed(window.location.origin + btn.getAttribute('data-rss-path'));
        });
      });
    }());
  </script>
  
  <script src="{{ "js/archive.js" | relURL }}"></script>
  <script src="{{ "js/hamburger.js" | relURL }}"></script>
  <script src="{{ "js/lightbox.js" | relURL }}"></script>
  <script src="{{ "js/masonry.js" | relURL }}"></script>
</body>

</html>
