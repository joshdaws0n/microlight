{{ define "main" }}
<section class="taxonomy-category">
  <!-- Category header -->
  <div class="d-flex flex-column justify-content-center align-items-center">
    {{ with .Content }}
    <p class="text-center">{{ . }}</p>
    {{ end }}
    <button
      class="header-rss-btn"
      data-rss-path="/categories/{{ .Title | urlize }}/feed.xml"
      aria-label="Copy RSS feed URL for {{ .Title }}"
    >
      <i class="fas fa-rss"></i>
      <span>RSS for {{ .Title }}</span>
    </button>
  </div>
  <!-- Reuse the post list partial -->
  {{ partial "post-list.html" (dict "Pages" .Pages "Site" .Site) }}
</section>
{{ end }}
